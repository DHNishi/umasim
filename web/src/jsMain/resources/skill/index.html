<!DOCTYPE html>
<html lang="en" prefix="og: http://ogp.me/ns#">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="twitter:card" content="summary_large_image"></meta>
	<meta property="og:url" content="https://mee1080.github.io/umasim/skill/" />
        <meta property="og:title" content="Umamusume Skill Data Text" />
        <meta property="og:description" content="Publishing Umamusume skill information as text" />
        <meta property="og:image" content="https://mee1080.github.io/umasim/skill/ogp.png" />
        <title>Umamusume Skill Data Text</title>

	<style>
		* {
			box-sizing: border-box;
			margin: 0px;
			padding: 0px;
		}
	</style>
</head>
<body style="height:100dvh;display:flex;flex-direction:column;overflow-y:hidden;">
        <div style="font-size:120%;font-weight:bold;">Umamusume Skill Data Text</div>
        <div>
                <label><input id="all" type="radio" name="target" value="https://raw.githubusercontent.com/mee1080/umasim/main/data/all_skill_info.txt"/>All skills</label>
                <label><input id="new" type="radio" name="target" value="https://raw.githubusercontent.com/mee1080/umasim/main/data/new_skill_info.txt"/>New skills</label>
        </div>
	<div style="flex-grow:1;">
		<textarea id="out" style="width:100%;height:100%;padding:4px;border-radius:4px;line-height:120%;" readonly></textarea>
	</div>
	<div>
                * Extracted from the DMM version's download data. Use at your own risk.
	</div>
	<script>
		const allRadio = document.getElementById('all');
		const newRadio = document.getElementById('new');
		const outArea = document.getElementById('out');

		function load(target) {
			out.value = '';
			fetch(target, {cache:'no-store'})
				.then(r => r.text())
				.then(t => out.value = t)
		}

		const initial = window.location.hash == '#new' ? newRadio : allRadio;
		initial.checked = true;
		load(initial.value);

		const onChange = e => {
			if (e.target.checked) {
				load(e.target.value);
			}
		}
		allRadio.addEventListener('change', onChange);
		newRadio.addEventListener('change', onChange);
	</script>
</body>
</html>
